{% macro render_ask_answer(answer) %}
<div
  id="ask-answer"
  class="inline-answer {{ '' if answer else 'is-empty' }}"
  data-ask-answer
  aria-live="polite"
>
  {% if answer %}
  <p>{{ answer.text }}</p>
  {% if answer.links %}
  <div class="answer-links">
    {% for link in answer.links %}
    <a href="{{ link.url }}">{{ link.label }}</a>
    {% endfor %}
  </div>
  {% endif %}
  {% else %}
  <p class="muted">Ask about issue timing, turns, errors, workers, workflow versions, or pending gates.</p>
  {% endif %}
</div>
{% endmacro %}
