{% extends "base.html" %}
{% block page_actions %}
<a class="button-link" href="/sources">Sources</a>
{% endblock %}
{% block body %}
<section class="panel narrow-panel">
  <form class="stacked-form" method="post" action="/sources">
    <label for="repo">GitHub Repository</label>
    <input
      id="repo"
      name="repo"
      required
      autocomplete="off"
      placeholder="dbcli/litecli"
      value="{{ repo }}"
    />
    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}
    <div class="form-actions">
      <button type="submit">Add Source</button>
      <a class="button-link quiet" href="/sources">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
